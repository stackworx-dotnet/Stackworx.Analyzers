# Publishes Stackworx.Analyzers to nuget.org using Trusted Publishing (OIDC).
# No long-lived NuGet API key is stored — NuGet/login exchanges a short-lived
# GitHub OIDC token for a temporary API key. See README/docs for the one-time
# nuget.org policy setup.
name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 1.2.3 or 1.2.3-preview.1)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # required for the GitHub OIDC token exchange
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Restore
        run: dotnet restore Stackworx.Analyzers/Stackworx.Analyzers.csproj

      - name: Pack
        run: >
          dotnet pack Stackworx.Analyzers/Stackworx.Analyzers.csproj
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.version }}
          --output ${{ github.workspace }}/artifacts

      # Request a short-lived NuGet API key via OIDC. Set the NUGET_USER repo
      # secret to your nuget.org username (profile name, NOT your email).
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: >
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
