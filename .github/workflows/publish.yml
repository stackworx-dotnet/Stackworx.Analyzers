# Publishes Stackworx.Analyzers to nuget.org using Trusted Publishing (OIDC).
# No long-lived NuGet API key is stored — NuGet/login exchanges a short-lived
# GitHub OIDC token for a temporary API key. See README/docs for the one-time
# nuget.org policy setup.
name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 1.2.3 or 1.2.3-preview.1)"
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write   # required for the GitHub OIDC token exchange
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version $VERSION"

      - name: Restore
        run: dotnet restore Stackworx.Analyzers/Stackworx.Analyzers.csproj

      - name: Pack
        run: >
          dotnet pack Stackworx.Analyzers/Stackworx.Analyzers.csproj
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.version }}
          --output ${{ github.workspace }}/artifacts

      # Request a short-lived NuGet API key via OIDC. Set the NUGET_USER repo
      # variable to your nuget.org username (profile name, NOT your email).
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to nuget.org
        run: >
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Bump preview version and commit
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin "$DEFAULT_BRANCH"
          git checkout "$DEFAULT_BRANCH"

          FILE="Stackworx.Analyzers/Stackworx.Analyzers.csproj"
          CURRENT_VERSION=$(grep -oE '<Version>[^<]+' "$FILE" | sed 's#<Version>##' | head -n1)

          if [[ ! "$CURRENT_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-preview\.([0-9]+)$ ]]; then
            echo "Expected a preview version in $FILE, got: $CURRENT_VERSION"
            exit 1
          fi

          BASE_VERSION="${BASH_REMATCH[1]}"
          PREVIEW_NUMBER="${BASH_REMATCH[2]}"
          NEXT_PREVIEW_NUMBER=$((PREVIEW_NUMBER + 1))
          NEXT_VERSION="$BASE_VERSION-preview.$NEXT_PREVIEW_NUMBER"

          sed -i "s#<Version>$CURRENT_VERSION</Version>#<Version>$NEXT_VERSION</Version>#" "$FILE"

          git add "$FILE"
          git commit -m "chore: bump analyzer preview version to $NEXT_VERSION"
          git push origin "$DEFAULT_BRANCH"
